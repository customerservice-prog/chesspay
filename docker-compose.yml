# Local PostgreSQL — run: docker compose up -d
# Port 5433 avoids clashing with a native Postgres install on 5432.
# Connection: postgresql://postgres:postgres@127.0.0.1:5433/checkmategg
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: checkmategg
    volumes:
      - chesspay_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d checkmategg']
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  chesspay_pg:
